<title>{{title}}</title>


<div>

    <div class="main-div">

        <div class="nav-class mt-2">
            @if (isTokenPresent==null) { <a [routerLink]="['/login']" routerLinkActive="active"><button type="button"
                    class="btn-custom m-2 p-2">Login</button></a>}
            @else { <a [routerLink]="['/dashboard']" routerLinkActive="active"><button type="button"
                    class="btn-custom m-2 p-2">Login</button></a>}
            @if (isTokenPresent==null) { <a [routerLink]="['/register']" routerLinkActive="deactive"><button
                    type="button" class="btn-custom m-2 p-2">Register</button></a>}
            @else { <a [routerLink]="['/dashboard']" routerLinkActive="active"><button type="button"
                    class="btn-custom m-2 p-2">Register</button></a>}


            <a [routerLink]="['/about']"><button type="button" class="btn-custom m-2 p-2">about us</button></a>
            <a [routerLink]="['/queries']"><button type="button" class="btn-custom m-2 p-2">queries</button></a>
        </div>

        <div class="content-class">
            <div class="content">
                <h2 class="m-0">WELCOME TO ONLINE VOTING PORTAL</h2>
                <h2>Vote Smart, Vote Secure, Vote Online!</h2>
                @if (isTokenPresent==null) {<a [routerLink]="['/login']"><button type="button"
                        class="m-1">Login</button></a>}
                @else {<a [routerLink]="['/dashboard']"><button type="button" class="m-1">Login</button></a>}
                @if (isTokenPresent==null) { <a [routerLink]="['/register']"><button type="button"
                        class=" m-1">Register</button></a>
                }
                @else {<a [routerLink]="['/dashboard']"><button type="button" class="m-1">Register</button></a>}


            </div>
            <div class="img-class">
                <img class="image" src="../../../assets/images/resize-1727596395267690737onlinevote.png"
                    alt="voter image">
            </div>

        </div>
    </div>
</div>
